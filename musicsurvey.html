    let currentPage = 1;
    const itemsPerPage = 10;

    function initPage() {
      renderPage();
      updateHeader();
    }

    function renderPage() {
      const totalPages = Math.ceil(responsesData.length / itemsPerPage);
      const startIndex = (currentPage - 1) * itemsPerPage;
      const currentResponses = responsesData.slice(startIndex, startIndex + itemsPerPage);

      const grid = document.getElementById('responses-grid');
      grid.innerHTML = '';

      currentResponses.forEach((response, index) => {
        const card = createResponseCard(response, startIndex + index);
        grid.appendChild(card);
      });

      document.getElementById('prev-btn').disabled = currentPage === 1;
      document.getElementById('next-btn').disabled = currentPage === totalPages;
      document.getElementById('current-page').textContent = currentPage;
      document.getElementById('total-pages').textContent = totalPages;

      const endIndex = Math.min(startIndex + itemsPerPage, responsesData.length);
      document.getElementById('pagination-text').textContent = 
        `Showing ${startIndex + 1} to ${endIndex} of ${responsesData.length} responses`;
    }

    function createResponseCard(response, index) {
      const card = document.createElement('div');
      card.className = 'response-card';
      card.onclick = (e) => {
        e.stopPropagation();
        toggleExpand(card);
      };

      const header = document.createElement('div');
      header.className = 'response-header';

      const info = document.createElement('div');
      info.className = 'response-info';
      
      const name = document.createElement('h3');
      name.textContent = response['Name '] || 'Anonymous';
      
      const age = document.createElement('p');
      age.textContent = 'Age: ' + (response['Age '] || 'Not specified');
      
      info.appendChild(name);
      info.appendChild(age);

      const icon = document.createElement('div');
      icon.className = 'expand-icon';
      icon.textContent = '▼';

      header.appendChild(info);
      header.appendChild(icon);

      const content = document.createElement('div');
      content.className = 'response-content';

      Object.entries(response).forEach(([key, value]) => {
        if (['Name ', 'Age ', 'Timestamp'].includes(key) || !value) {
          return;
        }

        const field = document.createElement('div');
        field.className = 'response-field';

        const label = document.createElement('h4');
        label.textContent = formatLabel(key);

        const text = document.createElement('p');
        text.textContent = value;

        field.appendChild(label);
        field.appendChild(text);
        content.appendChild(field);
      });

      card.appendChild(header);
      card.appendChild(content);

      return card;
    }

    function formatLabel(label) {
      return label
        .trim()
        .replace(/\s+/g, ' ')
        .replace(/^\d+\.\s*/, '')
        .split('?')[0]
        .trim();
    }

    function toggleExpand(card) {
      document.querySelectorAll('.response-card.expanded').forEach(c => {
        if (c !== card) {
          c.classList.remove('expanded');
        }
      });
      card.classList.toggle('expanded');
    }

    function previousPage() {
      if (currentPage > 1) {
        currentPage--;
        renderPage();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    }

    function nextPage() {
      const totalPages = Math.ceil(responsesData.length / itemsPerPage);
      if (currentPage < totalPages) {
        currentPage++;
        renderPage();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    }

    function updateHeader() {
      document.getElementById('total-count').textContent = 
        `${responsesData.length} responses from our community`;
    }

    window.addEventListener('DOMContentLoaded', initPage);
  </script>
